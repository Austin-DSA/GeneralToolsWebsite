<!DOCTYPE html>
<html lang="en">
    <script>
      // Saves the users timezone in a cookie
      // Timezone settings
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone; // e.g. "America/New_York"
      document.cookie = "django_timezone=" + timezone;
    </script>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>{% block title %}Austin DSA Tools{% endblock title %}</title>
    {% load static %}
    <link
      rel="stylesheet"
      href="{% static 'css/output.css' %}"
    />
  </head>
  <body class="font-display text-dark max-w-full">
    <header class="bg-primary w-full tools-header">
      <div class="flex justify-start items-center">
        <div class="bat-logo flex-none">
          <img src="{% static 'images\ATXDSA Circle Logo with Chapter Black.png' %}">
        </div>
        <div class="app-title text-2xl flex-auto">
          <h1><a href="/" style="text-decoration-line: none; color: black;">Austin DSA Tools</a></h1>
        </div>
        {# px-4/text-sm aren't in the compiled output.css — use px-8 + inline size #}
        <div class="flex-none px-8" style="font-size: 0.875rem;">
          {% if user.is_authenticated %}
            <span>{{ user.username }}</span>
            · <a href="{% url 'password_change' %}">Change password</a>
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
              {% csrf_token %}
              · <button type="submit" style="background: none; border: none; cursor: pointer; text-decoration: underline; font-size: inherit; font-family: inherit; padding: 0;">Log out</button>
            </form>
          {% else %}
            <a href="{% url 'login' %}">Log in</a>
          {% endif %}
        </div>
      </div>
    </header>
    <div class="flex justify-center">
      <div class="w-full px-8">
        {% block page_content %}{% endblock page_content %}
      </div>
    </div>
  </body>
</html>
