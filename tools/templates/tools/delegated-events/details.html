{% extends "base.html" %}
{% block breadcrumbs %}
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <a href="{% url 'index' %}">Home</a><span class="crumb-sep">›</span>
  <a href="{% url 'domain' 'events' %}">Events</a><span class="crumb-sep">›</span>
  <a href="{% url 'delegated-event-list' %}">Delegated Events</a><span class="crumb-sep">›</span>
  <span aria-current="page">{{ object.title }}</span>
</nav>
{% endblock breadcrumbs %}
{% block page_content %}
<div class="page-card max-w-2xl">
  <h1 class="page-title">{{ object.title }} <span class="badge badge-{{object.getStatusAsString|lower}} align-middle">{{object.getStatusAsString}}</span></h1>
  {% include "tools/common/commonEventDetails.html" %}
</div>
{% endblock page_content %}
